<!doctype html>
<html>
<head>
  <title>Docker Metrics</title>
</head>
<body>
  <h1>Docker Metrics</h1>
  <table border="1" id="metrics-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>CPU</th>
        <th>Memory</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
async function loadMetrics() {
  const containersRes = await fetch('/api/containers');
  const containers = await containersRes.json();
  const tbody = document.querySelector('#metrics-table tbody');

  for (const c of containers) {
    let row = document.querySelector(`tr[data-id='${c.id}']`);
    if (!row) {
      row = document.createElement('tr');
      row.setAttribute('data-id', c.id);
      row.innerHTML = `
        <td class="name"></td>
        <td class="status"></td>
        <td class="cpu"></td>
        <td class="mem"></td>
      `;
      tbody.appendChild(row);
    }

    const nameCell = row.querySelector('.name');
    const statusCell = row.querySelector('.status');
    const cpuCell = row.querySelector('.cpu');
    const memCell = row.querySelector('.mem');

    nameCell.textContent = c.name;
    statusCell.textContent = c.status;

    const statsRes = await fetch(`/api/containers/${c.id}/stats`);
    const stats = await statsRes.json();

    // cpu_percent from backend, formatted to 2 decimals
    cpuCell.textContent = stats.cpu_percent.toFixed(2) + " %";

    // mem_usage is already "18.34 MB", "2.00 GB", etc.
    memCell.textContent = stats.mem_usage;
  }
}

loadMetrics();
setInterval(loadMetrics, 3000);
</script>


</body>
</html>
