<!DOCTYPE html>
<html>
  <head>
    <title>Docker Metrics</title>
    <style>
      body {
        margin: 20px;
        background-color: #f5f5f5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      .status-running {
        color: green;
        font-weight: bold;
      }
      .status-exited {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Docker Container Metrics</h1>
    <table border="1" id="metrics-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>CPU %</th>
          <th>Memory Usage</th>
          <th>Memory Limit</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      async function loadMetrics() {
        // Fetch containers
        const containersRes = await fetch("/api/containers");
        const containers = await containersRes.json();
        const tbody = document.querySelector("#metrics-table tbody");
        // Fetch stats for each container
        for (const c of containers) {
          const statsRes = await fetch(`/api/containers/${c.id}/stats`);
          const stats = await statsRes.json();
          // Create row/Check if row already exists
          let row = tbody.querySelector(`tr[data-id='${c.id}']`);
          if (!row) {
            row = document.createElement("tr");
            row.setAttribute("data-id", c.id);
            tbody.appendChild(row);
          }

          const statusClass =
            stats.status === "running" ? "status-running" : "status-exited";
          row.innerHTML = `
            <td>${c.name}</td>
            <td class="${statusClass}">${stats.status}</td>
            <td>${stats.cpu_percent.toFixed(2)}%</td>
            <td>${stats.mem_usage}</td>
            <td>${stats.mem_limit}</td>
          `;
        }
      }

      loadMetrics();
      setInterval(loadMetrics, 3000);
    </script>
  </body>
</html>
