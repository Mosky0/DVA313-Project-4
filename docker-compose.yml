version: "3.9"

services:
  visualizer:
    build: .
    container_name: visualizer
    ports:
      - "5000:5000"
    # This lets the visualizer see metrics of other containers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  test-nginx:
    image: nginx:alpine
    container_name: test-nginx
